<section class="page">
  <header class="page__header">
    <div>
      <p class="page__eyebrow">Incidents</p>
      <h2 class="page__title">Tracked issues</h2>
    </div>
    <span class="page__meta">Mock list view</span>
  </header>

  <div class="table">
    <div class="table__head">
      <span>Incident</span>
      <span>Owner</span>
      <span>Severity</span>
      <span>Status</span>
    </div>

    @for (incident of incidents; track incident.title) {
      <article class="table__row">
        <strong>{{ incident.title }}</strong>
        <span>{{ incident.owner }}</span>
        <app-badge [tone]="incident.severity === 'High' ? 'danger' : 'warning'">
          {{ incident.severity }}
        </app-badge>
        <app-badge
          [tone]="
            incident.status === 'Open'
              ? 'warning'
              : incident.status === 'Investigating'
                ? 'info'
                : 'success'
          "
        >
          {{ incident.status }}
        </app-badge>
      </article>
    }
  </div>
</section>
