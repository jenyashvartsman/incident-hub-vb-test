<section class="page">
  <header class="page__header">
    <div>
      <p class="page__eyebrow">Incidents</p>
      <h2 class="page__title">Tracked issues</h2>
    </div>
    <span class="page__meta">Mock list view</span>
  </header>

  <app-table columns="minmax(0, 2fr) repeat(3, minmax(0, 1fr))">
    <div uiTableHead>
      <span uiTableCell>Incident</span>
      <span uiTableCell>Owner</span>
      <span uiTableCell>Severity</span>
      <span uiTableCell>Status</span>
    </div>

    @for (incident of incidents; track incident.title) {
      <article uiTableRow>
        <strong uiTableCell label="Incident">{{ incident.title }}</strong>
        <span uiTableCell label="Owner">{{ incident.owner }}</span>
        <app-badge uiTableCell label="Severity" [tone]="incident.severity === 'High' ? 'danger' : 'warning'">
          {{ incident.severity }}
        </app-badge>
        <app-badge
          uiTableCell
          label="Status"
          [tone]="
            incident.status === 'Open'
              ? 'warning'
              : incident.status === 'Investigating'
                ? 'info'
                : 'success'
          "
        >
          {{ incident.status }}
        </app-badge>
      </article>
    }
  </app-table>
</section>
