<section class="page">
  <header class="page__header">
    <div>
      <p class="page__eyebrow">Create incident</p>
      <h2 class="page__title">Open a new incident</h2>
      <p class="page__summary">Capture the key routing and incident context for the mock response workflow.</p>
    </div>

    <a class="page__link" routerLink="/incidents">Back to incidents</a>
  </header>

  <app-card padding="lg">
    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form__grid">
        <app-input-field-text formControlName="title" label="Title" placeholder="API latency spike" />
        <app-input-field-text formControlName="owner" label="Owner" placeholder="Platform" />
        <app-input-field-text formControlName="service" label="Service" placeholder="Public API" />
        <app-input-field-text
          formControlName="channel"
          label="Response channel"
          placeholder="Slack #incident-room"
        />
      </div>

      <app-input-field-select formControlName="severity" label="Severity" [options]="severityOptions" />

      <app-input-field-text formControlName="summary" label="Summary" [multiline]="true" [rows]="3" />

      <app-input-field-text formControlName="description" label="Description" [multiline]="true" [rows]="6" />

      <div class="form__actions">
        <a class="page__link" routerLink="/incidents">Cancel</a>
        <app-button type="submit">Create incident</app-button>
      </div>
    </form>
  </app-card>
</section>
