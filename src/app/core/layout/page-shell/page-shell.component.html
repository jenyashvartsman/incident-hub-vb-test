<div class="shell">
  <aside class="shell__sidebar">
    <div>
      <p class="shell__eyebrow">Incident Hub</p>
      <h1 class="shell__title">Operations Console</h1>
      <p class="shell__subtitle">Frontend scaffold for routing, shell layout, and feature pages.</p>
    </div>

    <nav class="shell__nav" aria-label="Primary navigation">
      @for (item of navItems; track item.path) {
        <a
          class="shell__nav-link"
          [routerLink]="item.path"
          routerLinkActive="shell__nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
